name: Windows Self-Hosted Runner

on:
  workflow_call:
    inputs:
      GAME_ID:
        required: true
        type: string
      COCOS_CREATOR_VERSION:
        required: false
        type: string
      ENVIRONMENT:
        required: false
        type: string
        default: ''
      TAG:
        required: false
        type: string
        default: ''
      ENABLE_ZIP_BUNDLE:
        required: false
        type: string
        default: 'false'
    secrets:
      TOKEN:
        required: true
      AWS_ENV:
        required: true
      CLOUD_FRONT:
        required: true
      CLOUD_FLARE:
        required: true
      CDNETWORKS:
        required: true
      AKAMAI:
        required: true
      WEBHOOK_URL:
        required: true
env:
  GAME_ID: ${{ inputs.GAME_ID }}
  # Cocos Creator Version
  COCOS_VERSION: ${{ format('C:\ProgramData\cocos\editors\Creator\{0}\CocosCreator.exe', inputs.COCOS_CREATOR_VERSION || '3.7.2') }}
  DEPLOY_STR: creator
  SLACK: true
  #DEPLOY_STR: 2dx

  # repositories
  GITHUB_DEPLOY: ${{ secrets.TOKEN }}
  AWS_ENV: ${{ secrets.AWS_ENV }}
  # purge CDN cache
  CLOUD_FRONT_API: ${{ secrets.CLOUD_FRONT }}
  CLOUD_FLARE_API: ${{ secrets.CLOUD_FLARE }}
  CDNETWORKS_API: ${{ secrets.CDNETWORKS }}
  AKAMAI_API: ${{ secrets.AKAMAI }}

jobs:
  creator:
    runs-on: [self-hosted, Windows, X64]
    steps:
      - name: Clean Cocos Creator cache
        run: |
          $path = "$env:USERPROFILE\.CocosCreator"
          if (Test-Path $path) { 
            Remove-Item -Recurse -Force $path
            Write-Host "Successfully deleted: $path"
          } else {
            Write-Host "Directory does not exist: $path"
          }
      - name: Clean Cocos Creator cache (temp)
        run: |
          $path = "$env:USERPROFILE\AppData\Local\Temp\CocosCreator\3.7.2\builder\engine"
          if (Test-Path $path) { 
            Remove-Item -Recurse -Force $path
            Write-Host "Successfully deleted: $path"
          } else {
            Write-Host "Directory does not exist: $path"
          }

      - name: Setup branch env
        uses: 5G-Games/Games-Common-CI/.github/actions/setup-branch-env@new_deploy
        with:
          github_ref_name: ${{ github.ref_name }}
          environment: ${{ inputs.ENVIRONMENT }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Cleanup workspace before build
        uses: 5G-Games/Games-Common-CI/.github/actions/cleanup-workspace@new_deploy

      - name: Configure Git
        uses: 5G-Games/Games-Common-CI/.github/actions/configure-git@new_deploy
        with:
          github_deploy: ${{ secrets.TOKEN }}

      - name: Clone deploy script
        uses: 5G-Games/Games-Common-CI/.github/actions/clone-deploy-script@new_deploy
        with:
          github_deploy: ${{ secrets.TOKEN }}

      - name: Clone game repositories
        uses: 5G-Games/Games-Common-CI/.github/actions/clone-game-repositories@new_deploy
        with:
          github_deploy: ${{ secrets.TOKEN }}
          game_id: ${{ inputs.GAME_ID }}
          branch: ${{ env.CLONE_BRANCH }}
          tag: ${{ inputs.TAG }}

      - name: Slack Notification - Start
        if: ${{ env.SLACK == 'true' }}
        uses: 5G-Games/Games-Common-CI/.github/actions/slack-notification@new_deploy
        with:
          webhook_url: ${{ secrets.WEBHOOK_URL }}
          job_status: success
          repository: ${{ github.repository }}
          branch: ${{ github.head_ref || github.ref }}
          actor: ${{ github.actor }}
          triggering_actor: ${{ github.triggering_actor || 'N/A' }}
          commit_message: ${{ github.event.head_commit.message || 'N/A' }}
          version_hash: ${{ env.VERSION_HASH || 'N/A' }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          compare_url: ${{ github.event.compare || 'N/A' }}
          status_text: 'Start'
          tag: ${{ inputs.TAG }}
          runner_name: ${{ runner.name }}
          deploy_env: ${{ env.BRANCH }}

      - name: Create deploy path
        uses: 5G-Games/Games-Common-CI/.github/actions/create-deploy-path@new_deploy
        with:
          game_id: ${{ inputs.GAME_ID }}

      - name: npm install
        uses: 5G-Games/Games-Common-CI/.github/actions/npm-install@new_deploy
        with:
          game_id: ${{ inputs.GAME_ID }}

      - name: Clone submodules
        uses: 5G-Games/Games-Common-CI/.github/actions/clone-submodules@new_deploy
        with:
          game_id: ${{ inputs.GAME_ID }}

      - name: Update CHEAT config
        if: ${{ env.BRANCH == 'stage' || env.BRANCH == 'prod' || env.BRANCH == 'demo' }}
        uses: 5G-Games/Games-Common-CI/.github/actions/update-cheat-config@new_deploy
        with:
          game_id: ${{ inputs.GAME_ID }}
          branch: ${{ env.BRANCH }}

      - name: Replace Build Config
        uses: 5G-Games/Games-Common-CI/.github/actions/replace-build-config@new_deploy
        with:
          game_id: ${{ inputs.GAME_ID }}
          branch: ${{ env.BRANCH }}

      - name: Build Cocos Mobile
        uses: 5G-Games/Games-Common-CI/.github/actions/build-cocos-mobile@test/remote
        with:
          game_id: ${{ inputs.GAME_ID }}
          cocos_version: ${{ env.COCOS_VERSION }}

      - name: build ZIP
        if: ${{ inputs.ENABLE_ZIP_BUNDLE == 'true' }}
        run: |
          $script = "game\${{ inputs.GAME_ID }}\build-templates\scripts\build-zip.js"
          if (Test-Path $script) {
            node $script
          }

      - name: Post-build processing
        run: |
          $script = "game\${{ inputs.GAME_ID }}\build-templates\scripts\post-build.js"
          if (Test-Path $script) {
            $env:ENABLE_ZIP_BUNDLE = "${{ inputs.ENABLE_ZIP_BUNDLE }}"
            node $script
          }

      - name: Copy packages
        uses: 5G-Games/Games-Common-CI/.github/actions/copy-packages@new_deploy
        with:
          game_id: ${{ inputs.GAME_ID }}

      - name: Deploy part 1
        uses: 5G-Games/Games-Common-CI/.github/actions/deploy-part1@new_deploy
        with:
          game_id: ${{ inputs.GAME_ID }}
          deploy_type: ${{ env.DEPLOY_TYPE }}
          deploy_str: ${{ env.DEPLOY_STR }}

      - name: Deploy part 2
        uses: 5G-Games/Games-Common-CI/.github/actions/deploy-part2@new_deploy
        with:
          game_id: ${{ inputs.GAME_ID }}
          branch: ${{ env.CLONE_BRANCH }}
          github_deploy: ${{ secrets.TOKEN }}

      - name: Upload S3
        uses: 5G-Games/Games-Common-CI/.github/actions/upload-s3@new_deploy
        with:
          game_id: ${{ inputs.GAME_ID }}
          s3_url: ${{ env.S3_URL }}

      - name: CDN cache prune
        uses: 5G-Games/Games-Common-CI/.github/actions/cdn-cache-prune@new_deploy
        with:
          game_id: ${{ inputs.GAME_ID }}
          branch: ${{ env.BRANCH }}
          cdn_cns_url: ${{ env.CDN_CNS_URL }}
          cdn_aka_url: ${{ env.CDN_AKA_URL }}
          cdn_cfe_url: ${{ env.CDN_CFE_URL }}
          cloud_front_id: ${{ env.CLOUD_FRONT_ID }}
          cloud_flare_api: ${{ secrets.CLOUD_FLARE }}
          domain_zone_id: ${{ env.DOMAIN_ZONE_ID }}
          cloud_front_api: ${{ secrets.CLOUD_FRONT }}
          cdnetworks_api: ${{ secrets.CDNETWORKS }}
          akamai_api: ${{ secrets.AKAMAI }}

      - name: Cleanup workspace after build
        uses: 5G-Games/Games-Common-CI/.github/actions/cleanup-workspace@new_deploy

      - name: Slack Notification - Complete
        if: ${{ env.SLACK == 'true' }}
        uses: 5G-Games/Games-Common-CI/.github/actions/slack-notification@new_deploy
        with:
          webhook_url: ${{ secrets.WEBHOOK_URL }}
          job_status: ${{ job.status }}
          repository: ${{ github.repository }}
          branch: ${{ github.head_ref || github.ref }}
          actor: ${{ github.actor }}
          triggering_actor: ${{ github.triggering_actor || 'N/A' }}
          commit_message: ${{ github.event.head_commit.message || 'N/A' }}
          version_hash: ${{ env.VERSION_HASH || 'N/A' }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          compare_url: ${{ github.event.compare || 'N/A' }}
          tag: ${{ inputs.TAG }}
          runner_name: ${{ runner.name }}
          deploy_env: ${{ env.BRANCH }}
