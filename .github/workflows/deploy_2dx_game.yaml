name: CI

on:
  push:
    branches: [dev,uat,test]
    paths-ignore:
      - '.github/workflows/**'  # <- 忽略 workflow 目錄下的變更
  workflow_dispatch:
jobs:
  call-common:
    uses: 5G-Games/Games-Common-CI/.github/workflows/deploy_2dx.yaml@old_1
    with:
      GAME_ID: %GAME_ID%
    secrets:
      TOKEN: ${{ secrets.TOKEN }}
      AWS_ENV: ${{ secrets.AWS_ENV }}
      CLOUD_FLARE: ${{ secrets.CLOUD_FLARE }}
      SADP_AWSCLI_CLOUDFRONT: ${{ secrets.SADP_AWSCLI_CLOUDFRONT }}
      BYTEPLUS_CDN_API_CREDENTIALS: ${{ secrets.BYTEPLUS_CDN_API_CREDENTIALS }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
