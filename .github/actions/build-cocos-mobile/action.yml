name: 'Build Cocos Mobile'
description: 'Build cocos creator repositories for web-mobile'
inputs:
  game_id:
    description: 'Game ID'
    required: true
  cocos_version:
    description: 'Cocos Creator version path'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Build web-mobile
      shell: cmd
      run: |
        echo cd game\%INPUT_GAME_ID% >> build.bat
        echo git restore --source=HEAD --staged --worktree assets >> build.bat
        echo CALL %INPUT_COCOS_VERSION% --no-cache --clear-cache --project . --build "platform=web-mobile;debug=false;md5Cache=true" >> build.bat
        echo IF EXIST build\web-mobile\5g_2.*.gif IF NOT EXIST build\web-mobile\5g_2.gif MOVE /Y build\web-mobile\5g_2.*.gif build\web-mobile\5g_2.gif >> build.bat

        CALL build.bat

        if %ERRORLEVEL%==36 exit 0
        if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%

        REM Remove 'remote' from projectBundles and bundleVers in settings.json
        cd game\%INPUT_GAME_ID%
        node -e "const fs=require('fs'),g=require('path'),b='build';if(!fs.existsSync(b))process.exit(0);const dirs=fs.readdirSync(b).filter(d=>d.startsWith('web-mobile')).sort().reverse();if(!dirs.length)process.exit(0);const d=g.join(b,dirs[0],'src');if(!fs.existsSync(d))process.exit(0);const f=fs.readdirSync(d).find(n=>n.startsWith('settings.')&&n.endsWith('.json'));if(!f)process.exit(0);const p=g.join(d,f),s=JSON.parse(fs.readFileSync(p,'utf8'));if(s.assets){s.assets.projectBundles=(s.assets.projectBundles||[]).filter(b=>b!=='remote');delete(s.assets.bundleVers||{})['remote'];fs.writeFileSync(p,JSON.stringify(s));console.log('Removed remote from settings.json: '+p)}"
        cd ..\..
      env:
        INPUT_GAME_ID: ${{ inputs.game_id }}
        INPUT_COCOS_VERSION: ${{ inputs.cocos_version }}
