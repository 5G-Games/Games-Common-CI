name: 'Build Cocos Mobile'
description: 'Build cocos creator repositories for web-mobile'
inputs:
  game_id:
    description: 'Game ID'
    required: true
  cocos_version:
    description: 'Cocos Creator version path'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Build web-mobile
      shell: cmd
      run: |
        echo cd game\%INPUT_GAME_ID% >> build.bat
        echo git restore --source=HEAD --staged --worktree assets >> build.bat
        echo CALL %INPUT_COCOS_VERSION% --no-cache --clear-cache --project . --build "platform=web-mobile;debug=false;md5Cache=true" >> build.bat
        echo IF EXIST build\web-mobile\5g_2.*.gif IF NOT EXIST build\web-mobile\5g_2.gif MOVE /Y build\web-mobile\5g_2.*.gif build\web-mobile\5g_2.gif >> build.bat

        CALL build.bat

        if %ERRORLEVEL%==36 exit 0
        if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%

      env:
        INPUT_GAME_ID: ${{ inputs.game_id }}
        INPUT_COCOS_VERSION: ${{ inputs.cocos_version }}
    - name: Remove remote bundle from settings.json
      shell: powershell
      run: |
        $buildRoot = "game\${{ inputs.game_id }}\build"
        Write-Host "Looking for build dir: $buildRoot"
        if (-not (Test-Path $buildRoot)) { Write-Host "Build dir not found, skip."; exit 0 }

        $webDir = Get-ChildItem -Path $buildRoot -Directory | Where-Object { $_.Name -match '^web-mobile' } | Sort-Object Name -Descending | Select-Object -First 1
        if (-not $webDir) { Write-Host "No web-mobile dir found, skip."; exit 0 }

        $srcDir = Join-Path $webDir.FullName "src"
        if (-not (Test-Path $srcDir)) { Write-Host "src dir not found, skip."; exit 0 }

        $settingsFile = Get-ChildItem -Path $srcDir -File | Where-Object { $_.Name -match '^settings\..*\.json$' } | Select-Object -First 1
        if (-not $settingsFile) { Write-Host "settings.json not found, skip."; exit 0 }

        Write-Host "Found: $($settingsFile.FullName)"
        $json = Get-Content $settingsFile.FullName -Raw | ConvertFrom-Json

        if ($json.assets) {
          $json.assets.projectBundles = @($json.assets.projectBundles | Where-Object { $_ -ne 'remote' })
          $json.assets.bundleVers.PSObject.Properties.Remove('remote')
          $json | ConvertTo-Json -Depth 20 -Compress | Set-Content $settingsFile.FullName
          Write-Host "Removed remote from settings.json"
        } else {
          Write-Host "No assets field in settings.json, skip."
        }
